<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#6464ff" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#6464ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow blob -->
  <ellipse cx="600" cy="315" rx="380" ry="280" fill="url(#glow)" filter="url(#blur)"/>

  <!-- Decorative stars (small dots) -->
  <circle cx="120" cy="80" r="1.5" fill="white" opacity="0.6"/>
  <circle cx="340" cy="50" r="1" fill="white" opacity="0.4"/>
  <circle cx="890" cy="110" r="2" fill="white" opacity="0.5"/>
  <circle cx="1080" cy="60" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="60" cy="400" r="1" fill="white" opacity="0.4"/>
  <circle cx="1140" cy="350" r="1.5" fill="white" opacity="0.5"/>
  <circle cx="200" cy="550" r="1" fill="white" opacity="0.3"/>
  <circle cx="980" cy="540" r="2" fill="white" opacity="0.4"/>
  <circle cx="440" cy="580" r="1" fill="white" opacity="0.35"/>
  <circle cx="760" cy="30" r="1.5" fill="#c8d4ff" opacity="0.5"/>
  <circle cx="1020" cy="480" r="1" fill="#c8d4ff" opacity="0.4"/>
  <circle cx="160" cy="200" r="1" fill="#ffd4e8" opacity="0.35"/>

  <!-- TARA wordmark -->
  <text
    x="600"
    y="290"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="130"
    font-weight="200"
    letter-spacing="48"
    fill="white"
    text-anchor="middle"
    dominant-baseline="middle"
    opacity="0.95"
  >TARA</text>

  <!-- Tagline -->
  <text
    x="600"
    y="380"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22"
    font-weight="300"
    letter-spacing="4"
    fill="#9ca3af"
    text-anchor="middle"
    dominant-baseline="middle"
  >Locally intelligent. Effortlessly human.</text>

  <!-- Domain -->
  <text
    x="600"
    y="550"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="16"
    font-weight="300"
    letter-spacing="2"
    fill="#4b5563"
    text-anchor="middle"
    dominant-baseline="middle"
  >tarahome.ai</text>
</svg>
