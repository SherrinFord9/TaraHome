name: Static Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  validate:
    name: Validate published files
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check required published files
        run: |
          test -f index.html
          test -f favicon.ico
          test -f blog/index.html
          test -f privacy/index.html
          test -d assets
